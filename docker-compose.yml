version: '3'
services:
    application:
        build:
            context: .
            dockerfile: Dockerfile
        image: ${IMAGE_NAME}
        restart: unless-stopped
        tty: true
        environment:
            SERVICE_NAME: ${IMAGE_NAME}-${APP_ENV}-application
            SERVICE_TAGS: dev
            DATABASE_URL: ${DATABASE_URL}
        working_dir: /app
        deploy:
            replicas: ${COMPOSE_REPLICAS:-1}
        volumes:
            - ./:/var/www
            - mock-service-data:/app/data
        networks:
            - proxy
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}.entrypoints=http"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}.rule=Host(`${APP_HOST}`)"
            - "traefik.http.middlewares.${IMAGE_NAME}-${APP_ENV}-https-redirect.redirectscheme.scheme=https"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}.middlewares=${IMAGE_NAME}-${APP_ENV}-https-redirect"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-secure.entrypoints=https"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-secure.rule=Host(`${APP_HOST}`)"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-secure.tls=true"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-secure.tls.certresolver=http"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-secure.service=${IMAGE_NAME}-${APP_ENV}"
            - "traefik.http.services.${IMAGE_NAME}-${APP_ENV}.loadbalancer.server.port=3000"
            - "traefik.docker.network=proxy"
            # CORS and Private Network Access (PNA) headers middleware
            - "traefik.http.middlewares.${IMAGE_NAME}-${APP_ENV}-cors.headers.accesscontrolallowmethods=GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD"
            - "traefik.http.middlewares.${IMAGE_NAME}-${APP_ENV}-cors.headers.accesscontrolallowheaders=Content-Type,Authorization,X-Requested-With,Accept,Origin"
            - "traefik.http.middlewares.${IMAGE_NAME}-${APP_ENV}-cors.headers.accesscontrolalloworiginlist=*"
            - "traefik.http.middlewares.${IMAGE_NAME}-${APP_ENV}-cors.headers.accesscontrolallowcredentials=true"
            - "traefik.http.middlewares.${IMAGE_NAME}-${APP_ENV}-cors.headers.accesscontrolmaxage=86400"
            # Private Network Access header - CRITICAL for local API testing
            - "traefik.http.middlewares.${IMAGE_NAME}-${APP_ENV}-cors.headers.customresponseheaders.Access-Control-Allow-Private-Network=true"
            # Apply CORS middleware to secure router
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-secure.middlewares=${IMAGE_NAME}-${APP_ENV}-https-redirect,${IMAGE_NAME}-${APP_ENV}-cors"

volumes:
    mock-service-data:
        driver: local

#Docker Networks
networks:
    proxy:
        external: true
