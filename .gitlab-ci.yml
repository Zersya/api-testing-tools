production:
  stage: release
  dependencies:
    - publish
  variables:
    TARGET_HOST: "prod-app-cluster-2"
  script:
    - bash trigger_awx_job_$CI_PROJECT_NAME.sh "production" "env_prod"
    - rm -f trigger_awx_job_$CI_PROJECT_NAME.sh
  tags:
    - production-gcp
  only:
    - /^([A-Za-z0-9.]+)$/
  except:
    - branches
  artifacts:
    paths:
      - .env
      - docker-compose.yml
    expire_in: 1 days
    when: always
  when : always